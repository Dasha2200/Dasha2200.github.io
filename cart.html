<!-- Форма оформления заказа (изначально скрыта) -->
<div id="order-modal" class="modal" style="display: none;">
    <div class="modal-content">
        <span class="close-modal">&times;</span>
        <h2>Оформление заказа</h2>
        
        <form action="https://formsubmit.co/sunrise-jewelry@yandex.ru?next=https://dasha2200.github.io/thank-you.html" method="POST">
            <!-- Скрытые поля для FormSubmit -->
            <input type="hidden" name="_captcha" value="false">
            <input type="hidden" name="_template" value="table">
            <input type="hidden" name="_subject" value="Новый заказ с Sunrise Jewelry!">
            
            <div class="form-group">
                <label>Ваше имя *</label>
                <input type="text" name="Имя" required>
            </div>
            <div class="form-group">
                <label>Телефон *</label>
                <input type="tel" name="Телефон" required>
            </div>
            <div class="form-group">
                <label>Email *</label>
                <input type="email" name="Email" required>
            </div>
            <div class="form-group">
                <label>Адрес доставки *</label>
                <input type="text" name="Адрес доставки" required>
            </div>
            <div class="form-group">
                <label>Комментарий к заказу</label>
                <textarea name="Комментарий" rows="3"></textarea>
            </div>
            
            <!-- Скрытые поля для состава заказа (заполняются через JS) -->
            <input type="hidden" name="Состав заказа" id="order-items-hidden">
            <input type="hidden" name="Итого" id="total-hidden">
            
            <button type="submit" class="btn-submit">Отправить заказ</button>
        </form>
        <div id="form-message" style="display: none;"></div>
    </div>
</div>
